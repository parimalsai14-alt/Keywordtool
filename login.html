<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login – Keyword Finalization Tool</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #0c0c0f;
      --bg-elevated: #131316;
      --surface: #1a1a1f;
      --border: #2c2c34;
      --text: #f0f0f2;
      --text-secondary: #8b8b95;
      --accent: #3d7bf5;
      --accent-hover: #5b94f7;
      --radius: 14px;
      --radius-sm: 10px;
      --shadow: 0 8px 32px rgba(0,0,0,0.35);
    }
    * { box-sizing: border-box; }
    body {
      font-family: "Plus Jakarta Sans", sans-serif;
      background: var(--bg);
      color: var(--text);
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
    }
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 2rem;
      width: 100%;
      max-width: 380px;
      box-shadow: var(--shadow);
    }
    .logo {
      width: 48px;
      height: 48px;
      background: linear-gradient(135deg, var(--accent), #2563eb);
      border-radius: var(--radius-sm);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.5rem;
      margin-bottom: 1.25rem;
    }
    h1 { font-size: 1.5rem; margin: 0 0 0.5rem 0; font-weight: 700; }
    .sub { color: var(--text-secondary); font-size: 0.9rem; margin-bottom: 1.5rem; }
    label { display: block; font-size: 0.875rem; font-weight: 500; color: var(--text-secondary); margin-bottom: 0.35rem; }
    input {
      width: 100%;
      padding: 0.75rem 1rem;
      font-size: 1rem;
      background: var(--bg-elevated);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      color: var(--text);
      margin-bottom: 1rem;
    }
    input:focus { outline: none; border-color: var(--accent); }
    .btn {
      width: 100%;
      padding: 0.75rem 1rem;
      font-size: 1rem;
      font-weight: 600;
      font-family: inherit;
      border: none;
      border-radius: var(--radius-sm);
      cursor: pointer;
      background: var(--accent);
      color: #fff;
      margin-top: 0.25rem;
    }
    .btn:hover { background: var(--accent-hover); }
    .btn:disabled { opacity: 0.6; cursor: not-allowed; }
    .error { color: #ef4444; font-size: 0.875rem; margin-top: 0.5rem; }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo" aria-hidden="true">⌘</div>
    <h1>Keyword Finalization Tool</h1>
    <p class="sub">Enter your password to continue</p>

    <form id="loginForm">
      <label for="password">Password</label>
      <input type="password" id="password" name="password" placeholder="Password" required autocomplete="current-password" />
      <button type="submit" class="btn" id="btnLogin">Log in</button>
      <p class="error" id="error" style="display:none"></p>
    </form>
  </div>
  <script>
    const form = document.getElementById("loginForm");
    const errorEl = document.getElementById("error");
    const btn = document.getElementById("btnLogin");

    form.addEventListener("submit", async (e) => {
      e.preventDefault();
      errorEl.style.display = "none";
      btn.disabled = true;
      try {
        const res = await fetch("/api/login", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ password: document.getElementById("password").value })
        });
        const data = await res.json().catch(() => ({}));
        if (!res.ok) {
          errorEl.textContent = data.error || "Invalid password";
          errorEl.style.display = "block";
          btn.disabled = false;
          return;
        }
        window.location.href = "/";
      } catch (err) {
        errorEl.textContent = "Network error";
        errorEl.style.display = "block";
        btn.disabled = false;
      }
    });
  </script>
</body>
</html>
